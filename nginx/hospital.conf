# ─────────────────────────────────────────────────────────────────
# MediCore HMS — Nginx Reverse Proxy Config
# Domain:   hospital.ahmaddataops.com
# Frontend: localhost:8082  (React → Nginx container)
# Backend:  localhost:8001  (Django → Gunicorn container)
#
# Deploy to VM:
#   sudo cp nginx/hospital.conf /etc/nginx/sites-available/hospital
#   sudo ln -s /etc/nginx/sites-available/hospital /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after above):
#   sudo certbot --nginx -d hospital.ahmaddataops.com
# ─────────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hospital.ahmaddataops.com;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hospital.ahmaddataops.com;

    # ── SSL Certificates (Certbot will fill these) ────────────────
    ssl_certificate     /etc/letsencrypt/live/hospital.ahmaddataops.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hospital.ahmaddataops.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/hospital_access.log;
    error_log  /var/log/nginx/hospital_error.log;

    # ── Limits ────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Django Backend: /api/* /admin/* /static/* /media/* ────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS for API
        add_header Access-Control-Allow-Origin  "https://hospital.ahmaddataops.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ── React Frontend: everything else ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # WebSocket support (for Jitsi video call signaling)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Gzip Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml font/woff2;
}
