# ─────────────────────────────────────────────────────────────────
# MediCore HMS — Nginx Reverse Proxy Config
# Domain: hospital.ahmaddataops.com
#
# SETUP INSTRUCTIONS:
# -------------------
# FIRST TIME (no SSL yet):
#   1. sudo cp nginx/hospital.conf /etc/nginx/sites-available/hospital
#   2. sudo ln -sf /etc/nginx/sites-available/hospital /etc/nginx/sites-enabled/hospital
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d hospital.ahmaddataops.com
#      (certbot adds HTTPS block automatically)
#
# SUBSEQUENT DEPLOYS (SSL already exists):
#   Pipeline handles this automatically via git pull + nginx reload
# ─────────────────────────────────────────────────────────────────

# ── HTTP Server ───────────────────────────────────────────────────
# NOTE: After running "certbot --nginx -d hospital.ahmaddataops.com"
#       certbot will automatically:
#         - Add SSL certificates to this config
#         - Add HTTP→HTTPS redirect
#         - Reload nginx
# ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hospital.ahmaddataops.com;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/hospital_access.log;
    error_log  /var/log/nginx/hospital_error.log;

    # ── Limits ────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Let's Encrypt ACME challenge ──────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Django Backend: /api/* /admin/* /static/* /media/* ────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ── React Frontend SPA: everything else ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # WebSocket support (Jitsi video calls)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml font/woff2;
}

# ─────────────────────────────────────────────────────────────────
# HTTPS block below is added automatically by certbot.
# Do NOT edit manually — certbot manages it.
# Run: sudo certbot --nginx -d hospital.ahmaddataops.com
# ─────────────────────────────────────────────────────────────────

# ── HTTPS Server ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hospital.ahmaddataops.com;

    # SSL certificates managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hospital.ahmaddataops.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hospital.ahmaddataops.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/hospital_access.log;
    error_log  /var/log/nginx/hospital_error.log;

    # ── Limits ────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Django Backend: /api/* /admin/* /static/* /media/* ────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ── React Frontend SPA: everything else ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # WebSocket support (Jitsi video calls)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml font/woff2;
}

