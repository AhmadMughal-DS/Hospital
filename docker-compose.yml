services:

  # ─── PostgreSQL Database ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hms_db
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD: hms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_user -d hms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend (Port 8000) ────────────────────────────────────
  backend:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend-django:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-only-change-in-production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hms_db
      - DB_USER=hms_user
      - DB_PASSWORD=hms_pass
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_hms &&
             python manage.py runserver 0.0.0.0:8000"

  # ─── React Frontend (Port 5173) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    ports:
      - "8082:5173"
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
    environment:
      - VITE_DJANGO_API_BASE=http://localhost:8001
      - VITE_QUEUE_API_BASE=http://localhost:8001
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
